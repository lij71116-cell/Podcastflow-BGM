<!DOCTYPE html>

<style>
        body {
            background-color: theme('colors.surface');
            color: theme('colors.text-primary');
        }
        .mesh-gradient {
            background-color: #163d35;
            background-image:
                radial-gradient(at 40% 20%, hsla(168, 47%, 45%, 0.45) 0px, transparent 50%),
                radial-gradient(at 80% 0%, hsla(189, 45%, 39%, 0.4) 0px, transparent 50%),
                radial-gradient(at 0% 50%, hsla(355, 100%, 93%, 0.15) 0px, transparent 50%),
                radial-gradient(at 80% 50%, hsla(168, 55%, 35%, 0.35) 0px, transparent 50%),
                radial-gradient(at 0% 100%, hsla(22, 100%, 77%, 0.12) 0px, transparent 50%),
                radial-gradient(at 80% 100%, hsla(168, 47%, 45%, 0.4) 0px, transparent 50%),
                radial-gradient(at 0% 0%, hsla(168, 47%, 45%, 0.35) 0px, transparent 50%);
        }
        .auth-brand-panel { position: relative; }
        .auth-brand-logo {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .auth-brand-logo .logo-dot {
            width: 12px; height: 12px;
            border-radius: 50%;
            background: #fff;
            box-shadow: 0 0 0 4px rgba(255, 255, 255, 0.15);
        }
        .auth-brand-logo .logo-text {
            color: #fff;
            font-weight: 700;
            letter-spacing: -0.02em;
        }
        .auth-brand-copy h1 {
            color: #fff;
            text-shadow: 0 2px 12px rgba(0, 0, 0, 0.18);
        }
        .auth-brand-copy p {
            color: rgba(166, 207, 196, 0.92);
        }
        .auth-brand-content { position: relative; z-index: 2; }
    </style>
<link href="assets/prototype-chrome.css?v=20260630" rel="stylesheet"/>
</head>
<body class="min-h-screen flex flex-col md:flex-row antialiased">
<!-- Left Brand Panel (Hidden on Mobile, 42% on Desktop) -->
<div class="hidden md:flex flex-col w-[42%] mesh-gradient auth-brand-panel text-on-primary p-unit-xl relative overflow-hidden">
<!-- Logo/Brand Anchor -->
<div class="auth-brand-content auth-brand-logo mb-auto">
<div class="logo-dot"></div>
<span class="font-display-lg text-headline-md tracking-tight logo-text">Podcast Flow</span>
</div>
<!-- Main Copy -->
<div class="auth-brand-content auth-brand-copy z-10 mt-24 max-w-md">
<h1 class="font-headline-md text-[40px] leading-[1.2] font-bold mb-unit-md tracking-tight">
                为小宇宙播客<br/>叠加你的专注 BGM
            </h1>
<p class="font-body-md text-body-md mt-unit-sm">
                无缝同步你的音频库，沉浸在专注与灵感的混音流中。现代温暖，纯粹聆听。
            </p>
</div>
<!-- Abstract Waveform Graphic (Decorative) -->
<div class="absolute bottom-0 left-0 w-full h-48 opacity-40 mix-blend-overlay pointer-events-none flex items-end justify-between px-unit-lg pb-unit-lg gap-1 z-[2]">
<div class="w-1/12 bg-white rounded-t-full h-8 animate-[pulse_2s_ease-in-out_infinite]"></div>
<div class="w-1/12 bg-white rounded-t-full h-16 animate-[pulse_2.5s_ease-in-out_infinite_0.2s]"></div>
<div class="w-1/12 bg-white rounded-t-full h-24 animate-[pulse_3s_ease-in-out_infinite_0.4s]"></div>
<div class="w-1/12 bg-white rounded-t-full h-12 animate-[pulse_2.2s_ease-in-out_infinite_0.6s]"></div>
<div class="w-1/12 bg-white rounded-t-full h-32 animate-[pulse_2.8s_ease-in-out_infinite_0.8s]"></div>
<div class="w-1/12 bg-white rounded-t-full h-20 animate-[pulse_2.4s_ease-in-out_infinite_1s]"></div>
<div class="w-1/12 bg-white rounded-t-full h-10 animate-[pulse_3.2s_ease-in-out_infinite_1.2s]"></div>
</div>
</div>
<!-- Right Auth Panel (100% on Mobile, 58% on Desktop) -->
<div class="flex-1 flex flex-col justify-center items-center p-margin-edge relative">
<!-- Mobile Brand Logo -->
<div class="md:hidden flex items-center gap-2 absolute top-margin-edge left-margin-edge">
<div class="w-3 h-3 bg-primary-container rounded-full"></div>
<span class="font-display-lg-mobile text-headline-md font-bold text-primary-container">Podcast Flow</span>
</div>
<!-- Centered Card Container -->
<div class="w-full max-w-[400px] bg-surface-container-lowest rounded-xl shadow-[0_4px_20px_rgba(0,0,0,0.04)] border border-border-subtle p-unit-lg transition-transform duration-300 hover:-translate-y-[2px] hover:shadow-[0_12px_30px_rgba(0,0,0,0.08)]">
<!-- Header -->
<div class="mb-unit-lg text-center">
<h2 class="font-headline-md text-display-lg text-text-primary mb-2">欢迎回来</h2>
<p class="font-body-md text-body-md text-text-secondary">使用用户名或邮箱登录</p>
</div>
<!-- Segmented Control -->
<div class="flex p-1 bg-surface-container-low rounded-lg mb-unit-lg border border-border-subtle">
<button class="flex-1 py-2 font-label-sm text-label-sm font-bold bg-white text-primary-container shadow-sm rounded-md transition-all">用户名登录</button>
<button class="flex-1 py-2 font-label-sm text-label-sm font-medium text-text-secondary hover:text-text-primary transition-all rounded-md hover:bg-surface">邮箱登录</button>
</div>
<!-- Form -->
<form action="index.html" class="space-y-unit-md flex flex-col" method="get">
<!-- Username Field -->
<div class="flex flex-col gap-1">
<label class="font-label-sm text-label-sm text-text-primary" for="username">用户名</label>
<input class="w-full px-4 py-3 bg-surface-elevated border border-border-strong rounded-lg font-body-md text-body-md focus:outline-none focus:border-primary-container focus:ring-1 focus:ring-primary-container transition-colors placeholder:text-text-tertiary" id="username" placeholder="输入您的用户名" type="text"/>
</div>
<!-- Password Field -->
<div class="flex flex-col gap-1">
<div class="flex justify-between items-center">
<label class="font-label-sm text-label-sm text-text-primary" for="password">密码</label>
<a class="font-label-sm text-label-sm text-primary-container hover:text-primary-hover transition-colors" href="#">忘记密码？</a>
</div>
<div class="relative">
<input class="w-full px-4 py-3 bg-surface-elevated border border-border-strong rounded-lg font-body-md text-body-md focus:outline-none focus:border-primary-container focus:ring-1 focus:ring-primary-container transition-colors placeholder:text-text-tertiary" id="password" placeholder="输入密码" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-text-secondary hover:text-text-primary" type="button">
<span class="material-symbols-outlined text-[20px]">visibility_off</span>
</button>
</div>
</div>
<!-- Submit Button -->
<button class="w-full mt-unit-sm py-3 px-4 bg-primary-container text-white font-headline-md text-body-md font-bold rounded-lg hover:bg-primary-hover transition-colors active:scale-[0.98]" type="submit">
                    登录
                </button>
</form>
<!-- Footer -->
<div class="mt-unit-lg text-center font-body-md text-body-md">
<span class="text-text-secondary">还没有账号？</span>
<a class="text-primary-container font-bold hover:text-primary-hover transition-colors ml-1" href="#">立即注册</a>
</div>
</div>
</div>
</body></html>

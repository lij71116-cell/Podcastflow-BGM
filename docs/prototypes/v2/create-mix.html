<script>
(function () {
  const idle = document.getElementById('preview-idle');
  const active = document.getElementById('preview-active');
  const startBtn = document.getElementById('btn-start-preview');
  const playBtn = document.getElementById('preview-play-btn');
  const playIcon = document.getElementById('preview-play-icon');
  const progress = document.getElementById('preview-progress');
  const timeLabel = document.getElementById('preview-time-label');
  const bars = document.getElementById('preview-wave-bars');
  const volInput = document.getElementById('preview-volume');
  const volLabel = document.getElementById('preview-vol-label');
  const PODCAST_DURATION_SEC = 45 * 60 + 20;
  let playing = true;
  let timer = null;
  let sec = 0;

  function fmt(s) {
    const m = Math.floor(s / 60);
    const r = Math.floor(s % 60);
    return m + ':' + String(r).padStart(2, '0');
  }
  function syncTime() {
    timeLabel.textContent = fmt(sec) + ' / ' + fmt(PODCAST_DURATION_SEC);
    progress.value = sec;
  }
  function tick() {
    if (!playing) return;
    if (sec >= PODCAST_DURATION_SEC) {
      sec = PODCAST_DURATION_SEC;
      playing = false;
      playIcon.textContent = 'play_arrow';
      bars.classList.add('paused');
      if (timer) { clearInterval(timer); timer = null; }
      syncTime();
      return;
    }
    sec += 1;
    syncTime();
  }
  startBtn.addEventListener('click', () => {
    active.classList.add('is-visible');
    startBtn.disabled = true;
    startBtn.innerHTML = '<span class="material-symbols-outlined">equalizer</span> 试听中…';
    startBtn.classList.add('opacity-60', 'cursor-default');
    sec = 0;
    playing = true;
    playIcon.textContent = 'pause';
    bars.classList.remove('paused');
    syncTime();
    if (timer) clearInterval(timer);
    timer = setInterval(tick, 1000);
  });
  playBtn.addEventListener('click', () => {
    playing = !playing;
    playIcon.textContent = playing ? 'pause' : 'play_arrow';
    bars.classList.toggle('paused', !playing);
    if (playing && !timer) timer = setInterval(tick, 1000);
    if (!playing && timer) { clearInterval(timer); timer = null; }
  });
  progress.addEventListener('input', () => {
    sec = parseFloat(progress.value);
    syncTime();
  });
  volInput.addEventListener('input', () => {
    volLabel.textContent = volInput.value + '%';
  });
})();
</script>
